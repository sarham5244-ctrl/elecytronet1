
  media: public/img

content:
  - name: homepage
    label: Homepage
    type: file
    path: content/home/index.md
    fields:
      - { name: title, label: Page Title, type: string }
      - { name: hero_title, label: Hero Title, type: string }
      - { name: hero_subtitle, label: Hero Subtitle, type: string }
      - { name: body, label: Main Content, type: rich-text }

  - name: about
    label: About Page
    type: file
    path: content/about/index.md
    fields:
      - { name: title, label: Page Title, type: string }
      - { name: body, label: About Content, type: rich-text }
  - name: about
    label: About page
    type: file
    path: content/about/index.md
    fields:
      - { name: layout, type: string, hidden: true, default: layouts/base.njk }
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, label: Key, type: string }
          - { name: order, label: Order, type: number }
      - { name: body, label: Body, type: rich-text }
  - name: metadata
    label: Metadata
    type: file
    path: _data/metadata.js
    format: code
